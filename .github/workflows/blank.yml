name: Application Deployment

on:
  push:
    branches:
      - main

jobs:

  deploy-db:

    runs-on: ubuntu-latest

    outputs:
      migration_success: ${{ steps.wait.outputs.success }}

    steps:

      - name: Trigger employee-db-migration Migration
        env:
          TOKEN: ${{ secrets.EMPLOYEEDBMIGRATIONPAT }}
        run: |

          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $TOKEN" \
          https://api.github.com/repos/vikasvsingh-netizen/employee-db-migrations/actions/workflows/migrate.yml/dispatches \
          -d '{"ref":"dev"}'

      - name: Wait 10 sec
        run: sleep 10

      - name: Wait for Workflow Completion
        id: wait
        env:
          TOKEN: ${{ secrets.EMPLOYEEDBMIGRATIONPAT }}
        run: |

          WORKFLOW_NAME="Database Migration"

          while true
          do

            STATUS=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              https://api.github.com/repos/vikasvsingh-netizen/employee-db-migrations/actions/workflows/migrate.yml/runs \
              | jq -r '.workflow_runs[0].status')

            CONCLUSION=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              https://api.github.com/repos/vikasvsingh-netizen/employee-db-migrations/actions/workflows/migrate.yml/runs \
              | jq -r '.workflow_runs[0].conclusion')

            echo "STATUS=$STATUS"
            echo "CONCLUSION=$CONCLUSION"

            if [ "$STATUS" = "completed" ]; then

              if [ "$CONCLUSION" = "success" ]; then
                echo "success=true" >> $GITHUB_OUTPUT
                exit 0
              else
                echo "success=false" >> $GITHUB_OUTPUT
                exit 1
              fi

            fi

            sleep 15

          done
